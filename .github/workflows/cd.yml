name: Production & Staging Deploy

on:
  push:
    branches: ["main", "staging"]

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1: BUILD & PUSH Docker image to Docker Hub
  # ---------------------------------------------------------------------------
  build-image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Branch Name
        id: branch_name
        run: echo "branch=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./server
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/portfolio-backend:${{ steps.branch_name.outputs.branch }}
            ${{ secrets.DOCKER_USERNAME }}/portfolio-backend:latest

  # ---------------------------------------------------------------------------
  # JOB 2: STAGING DEPLOY
  # Provisions Redis container if not running, then deploys the backend.
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    needs: build-image
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Staging via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          script: |
            # 1. Ensure Redis is running (idempotent — no-op if already up)
            if ! docker ps --filter "name=redis-staging" --filter "status=running" | grep -q redis-staging; then
              docker rm -f redis-staging 2>/dev/null || true
              docker run -d \
                --name redis-staging \
                --restart unless-stopped \
                -p 127.0.0.1:6380:6379 \
                redis:7-alpine \
                redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru --save ""
              echo "[Redis] Staging Redis started"
            else
              echo "[Redis] Staging Redis already running"
            fi

            # 2. Pull the fresh backend image
            docker pull ${{ secrets.DOCKER_USERNAME }}/portfolio-backend:staging

            # 3. Stop and remove the old backend container
            docker stop backend-staging || true
            docker rm backend-staging || true

            # 4. Clean up dangling images to save space
            docker image prune -f

            # 5. Start the new backend container
            docker run -d \
              --name backend-staging \
              -p 5001:5000 \
              --restart unless-stopped \
              -e PORT=5000 \
              -e DATABASE_URL='${{ secrets.STAGING_DATABASE_URL }}' \
              -e RESEND_API_KEY='${{ secrets.RESEND_API_KEY }}' \
              -e CORS_ORIGINS='${{ secrets.STAGING_FRONTEND_URL }}' \
              - e JWT_SECRET='${{ secrets.JWT_SECRET }}' \
              - e CLOUDINARY_CLOUD_NAME='${{ secrets.CLOUDINARY_CLOUD_NAME }}' \
              - e CLOUDINARY_API_KEY='${{ secrets.CLOUDINARY_API_KEY }}' \
              - e CLOUDINARY_API_SECRET='${{ secrets.CLOUDINARY_API_SECRET }}' \
              - e TURNSTILE_SECRET_KEY='${{ secrets.TURNSTILE_SECRET_KEY }}' \
              - e NODE_ENV='production' \
              - e REDIS_URL='redis://127.0.0.1:6380' \
              ${{ secrets.DOCKER_USERNAME }}/portfolio-backend:staging

  # ---------------------------------------------------------------------------
  # JOB 3: PRODUCTION DEPLOY
  # Provisions Redis container if not running, then deploys the backend.
  # ---------------------------------------------------------------------------
  deploy-production:
    name: Deploy to Production
    needs: build-image
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Production via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Ensure Redis is running (idempotent — no-op if already up)
            if ! docker ps --filter "name=redis" --filter "status=running" | grep -q "^.*redis$"; then
              docker rm -f redis 2>/dev/null || true
              docker run -d \
                --name redis \
                --restart unless-stopped \
                -p 127.0.0.1:6379:6379 \
                redis:7-alpine \
                redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save ""
              echo "[Redis] Production Redis started"
            else
              echo "[Redis] Production Redis already running"
            fi

            # 2. Pull the fresh backend image
            docker pull ${{ secrets.DOCKER_USERNAME }}/portfolio-backend:main

            # 3. Stop and remove the old backend container
            docker stop backend || true
            docker rm backend || true

            # 4. Clean up dangling images to save space
            docker image prune -f

            # 5. Start the new backend container
            docker run -d \
              --name backend \
              -p 5000:5000 \
              --restart unless-stopped \
              -e PORT=5000 \
              -e DATABASE_URL='${{ secrets.DATABASE_URL }}' \
              -e RESEND_API_KEY='${{ secrets.RESEND_API_KEY }}' \
              -e CORS_ORIGINS='${{ secrets.FRONTEND_URL }}' \
              -e JWT_SECRET='${{ secrets.JWT_SECRET }}' \
              -e CLOUDINARY_CLOUD_NAME='${{ secrets.CLOUDINARY_CLOUD_NAME }}' \
              -e CLOUDINARY_API_KEY='${{ secrets.CLOUDINARY_API_KEY }}' \
              - e CLOUDINARY_API_SECRET='${{ secrets.CLOUDINARY_API_SECRET }}' \
              - e TURNSTILE_SECRET_KEY='${{ secrets.TURNSTILE_SECRET_KEY }}' \
              - e NODE_ENV='production' \
              - e REDIS_URL='redis://127.0.0.1:6379' \
              ${{ secrets.DOCKER_USERNAME }}/portfolio-backend:main
