name: Production Deploy

on:
  push:
    branches: ["main"]

jobs:
  # JOB 1: BUILD & PUSH (Runs on push & PRs)
  build-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/portfolio-backend:latest

  # JOB 2: DEPLOY TO AWS (Runs ONLY on push to main, after build succeeds)
  deploy-server:
    needs: build-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Stop and remove the old container
            docker stop backend || true
            docker rm backend || true

            # 2. Free up space (Critical: "No space left on device" fix)
            # Remove the old image explicitly to free space for the new pull
            docker rmi ${{ secrets.DOCKER_USERNAME }}/portfolio-backend:latest || true
            # Prune dangling images and stopped containers
            docker system prune -f

            # 3. Pull the fresh image (Just built in the previous job)
            docker pull ${{ secrets.DOCKER_USERNAME }}/portfolio-backend:latest

            # 3. Start the new container
            # 🟢 UPDATED: All sensitive/config values come from secrets now
            docker run -d \
              --name backend \
              -p 5000:5000 \
              --restart unless-stopped \
              -e PORT=${{ secrets.PORT }} \
              -e DATABASE_URL='${{ secrets.DATABASE_URL }}' \
              -e RESEND_API_KEY='${{ secrets.RESEND_API_KEY }}' \
              -e CORS_ORIGINS='${{ secrets.FRONTEND_URL }}' \
              -e JWT_SECRET='${{ secrets.JWT_SECRET }}' \
              -e NODE_ENV='production' \
              ${{ secrets.DOCKER_USERNAME }}/portfolio-backend:latest
