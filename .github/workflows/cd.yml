name: Production & Staging Deploy

on:
  push:
    branches: ["main", "staging"]

jobs:
  # JOB 1: BUILD & PUSH
  build-image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Branch Name
        id: branch_name
        run: echo "branch=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/portfolio-backend:${{ steps.branch_name.outputs.branch }}
            ${{ secrets.DOCKER_USERNAME }}/portfolio-backend:latest

  # JOB 2: STAGING DEPLOY (Runs ONLY on push to development)
  deploy-staging:
    name: Deploy to Staging
    needs: build-image
    if: github.ref == 'refs/heads/development' || github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Staging via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          script: |
            # 1. Pull the fresh image
            docker pull ${{ secrets.DOCKER_USERNAME }}/portfolio-backend:development

            # 2. Stop and remove the old container
            docker stop backend-staging || true
            docker rm backend-staging || true

            # 3. Clean up old images/containers to save space
            docker system prune -f

            # 4. Start the new container
            docker run -d \
              --name backend-staging \
              -p 5001:5000 \
              --restart unless-stopped \
              -e PORT=5000 \
              -e DATABASE_URL='${{ secrets.STAGING_DATABASE_URL }}' \
              -e RESEND_API_KEY='${{ secrets.RESEND_API_KEY }}' \
              -e CORS_ORIGINS='${{ secrets.STAGING_FRONTEND_URL }}' \
              -e JWT_SECRET='${{ secrets.JWT_SECRET }}' \
              -e NODE_ENV='production' \
              ${{ secrets.DOCKER_USERNAME }}/portfolio-backend:development

  # JOB 3: PRODUCTION DEPLOY (Runs ONLY on push to main)
  deploy-production:
    name: Deploy to Production
    needs: build-image
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Production via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Pull the fresh image
            docker pull ${{ secrets.DOCKER_USERNAME }}/portfolio-backend:main

            # 2. Stop and remove the old container
            docker stop backend || true
            docker rm backend || true

            # 3. Clean up old images/containers to save space
            docker system prune -f

            # 4. Start the new container
            docker run -d \
              --name backend \
              -p 5000:5000 \
              --restart unless-stopped \
              -e PORT=5000 \
              -e DATABASE_URL='${{ secrets.DATABASE_URL }}' \
              -e RESEND_API_KEY='${{ secrets.RESEND_API_KEY }}' \
              -e CORS_ORIGINS='${{ secrets.FRONTEND_URL }}' \
              -e JWT_SECRET='${{ secrets.JWT_SECRET }}' \
              -e CLOUDINARY_CLOUD_NAME='${{ secrets.CLOUDINARY_CLOUD_NAME }}' \
              -e CLOUDINARY_API_KEY='${{ secrets.CLOUDINARY_API_KEY }}' \
              -e CLOUDINARY_API_SECRET='${{ secrets.CLOUDINARY_API_SECRET }}' \
              -e NODE_ENV='production' \
              ${{ secrets.DOCKER_USERNAME }}/portfolio-backend:main
