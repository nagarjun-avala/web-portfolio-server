name: CI

on:
  pull_request:
    branches: ["development", "main"]
  push:
    branches: ["development"]

jobs:
  ci:
    name: Lint, Test & Audit
    runs-on: ubuntu-latest

    # ---------------------------------------------------------------------------
    # Redis service container — required for the new Redis cache middleware.
    # Tests will connect via REDIS_URL=redis://localhost:6379
    # ---------------------------------------------------------------------------
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      CORS_ORIGINS: ${{ secrets.FRONTEND_URL }}
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install Dependencies
        working-directory: server
        run: npm ci

      - name: Check Formatting (Prettier)
        working-directory: server
        run: npm run format:check

      - name: Lint Code (ESLint)
        working-directory: server
        run: npm run lint

      - name: Type Check (TypeScript)
        working-directory: server
        run: npm run build

      - name: Run Tests (Jest)
        working-directory: server
        run: npm test

      - name: Security Audit (npm audit)
        working-directory: server
        run: npm audit --audit-level=high
