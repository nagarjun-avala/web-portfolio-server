name: Production Deploy

on:
  push:
    branches: ["main"]

jobs:
  # Job 1: Final Test Check
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci

  # Job 2: Build & Deploy (Only if tests pass)
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 2. Build & Push Docker Image
      - name: Build and Push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/portfolio-backend:latest

      # 3. Deploy to AWS via SSH
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Stop old container
            docker stop backend || true
            docker rm backend || true

            # Pull new image
            docker pull ${{ secrets.DOCKER_USERNAME }}/portfolio-backend:latest

            # Start new container
            docker run -d \
              --name backend \
              -p 5000:5000 \
              -e FRONTEND_URL=https://nagarjun-avala.vercel.app \
              ${{ secrets.DOCKER_USERNAME }}/portfolio-backend:latest
