name: Debug Secrets
on:
  push:
    branches: ["main"]
jobs:
  check-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Check Secret Availability
        env:
          # We map the secrets to env vars to check them safely
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASS: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "--- DEBUG INFO ---"

          if [ -z "$DOCKER_USER" ]; then
            echo "❌ DOCKER_USERNAME is EMPTY (Length: 0)"
            echo "   Fix: Go to Settings -> Secrets -> Actions and ensure 'DOCKER_USERNAME' exists."
            exit 1
          else
            # We print the length to prove it's not empty, without revealing the secret
            echo "✅ DOCKER_USERNAME found! (Length: ${#DOCKER_USER})"
          fi

          if [ -z "$DOCKER_PASS" ]; then
            echo "❌ DOCKER_PASSWORD is EMPTY (Length: 0)"
            exit 1
          else
            echo "✅ DOCKER_PASSWORD found! (Length: ${#DOCKER_PASS})"
          fi

          echo "--- END DEBUG ---"
